<!DOCTYPE html>
<html class="dark" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Đọc bài viết | CORNDEVs</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital,wght@0,400;1,400&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet"/>
    
    <!-- Markdown & Syntax Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "background": "hsl(var(--background))",
                        "foreground": "hsl(var(--foreground))",
                        "muted-foreground": "hsl(var(--muted-foreground))",
                        "primary": "hsl(var(--primary))",
                        "on-primary": "hsl(var(--primary-foreground))",
                        "secondary": "hsl(var(--secondary))",
                        "muted": "hsl(var(--muted))",
                        "accent": "hsl(var(--accent))",
                        "border": "hsl(var(--border))",
                        "input": "hsl(var(--input))",
                        
                        "surface": "#0b1326",
                        "surface-dim": "#0b1326",
                        "surface-bright": "#31394d",
                        "surface-container-lowest": "#060e20",
                        "surface-container-low": "#131b2e",
                        "surface-container": "#171f33",
                        "surface-container-high": "#222a3d",
                        "surface-container-highest": "#2d3449",
                        "on-surface": "#dae2fd",
                        "on-surface-variant": "#c2c6d6",
                        "outline": "#8c909f",
                        "outline-variant": "#424754",
                        "primary-container": "#4d8eff",
                        "on-primary-container": "#00285d",
                        "secondary-container": "#c0c1ff",
                        "tertiary": "#ffb786",
                    },
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                        mono: ["monospace"],
                        label: ["Space Grotesk", "sans-serif"],
                        display: ["'Instrument Serif'", "serif"],
                    },
                },
            },
        };
    </script>
    <style>
        :root {
            --background: 201 100% 13%;
            --foreground: 0 0% 100%;
            --muted-foreground: 240 4% 66%;
            --primary: 0 0% 100%;
            --primary-foreground: 0 0% 4%;
            --secondary: 0 0% 10%;
            --muted: 0 0% 10%;
            --accent: 0 0% 10%;
            --border: 0 0% 18%;
            --input: 0 0% 18%;
        }
        body {
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            font-family: 'Inter', sans-serif;
        }
        .label-text { font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: 0.05em; }
        
        /* Markdown Styling */
        #content h1 { font-family: 'Instrument Serif', serif; font-size: 3rem; font-weight: 400; line-height: 1.1; margin-bottom: 2rem; color: hsl(var(--foreground)); letter-spacing: -0.02em; }
        #content h2 { font-family: 'Instrument Serif', serif; font-size: 2.25rem; font-weight: 400; line-height: 1.2; margin-top: 3.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 0.5rem; color: hsl(var(--foreground)); }
        #content h3 { font-size: 1.35rem; font-weight: 600; line-height: 1.4; margin-top: 2.5rem; margin-bottom: 1rem; color: #adc6ff; }
        #content p { margin-bottom: 1.5rem; line-height: 1.8; color: #c2c6d6; font-size: 1.05rem; }
        #content ul, #content ol { list-style-position: outside; margin-left: 1.5rem; margin-bottom: 1.5rem; color: #c2c6d6; }
        #content ul { list-style-type: disc; }
        #content ol { list-style-type: decimal; }
        #content li { margin-bottom: 0.75rem; line-height: 1.7; }
        #content code { font-family: monospace; background-color: rgba(255,255,255,0.05); padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-size: 0.9em; color: #ffb786; }
        #content pre { background-color: rgba(0,0,0,0.3); padding: 1.5rem; border-radius: 0.75rem; border: 1px solid rgba(255,255,255,0.08); overflow-x: auto; margin: 2.5rem 0; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        #content pre code { background-color: transparent; padding: 0; color: inherit; font-size: 0.95rem; line-height: 1.6; }
        #content blockquote { border-left: 4px solid #adc6ff; padding-left: 1.5rem; font-style: italic; color: hsl(var(--foreground)); margin: 2.5rem 0; background: rgba(173, 198, 255, 0.05); padding-top: 1rem; padding-bottom: 1rem; border-radius: 0 0.5rem 0.5rem 0; }
        #content hr { border: 0; border-top: 1px solid rgba(255,255,255,0.08); margin: 4rem 0; }
        #content strong { color: hsl(var(--foreground)); font-weight: 700; }
        #content img { border-radius: 0.75rem; margin: 2.5rem auto; display: block; border: 1px solid rgba(255,255,255,0.08); }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased">
    <!-- Header -->
    <header class="sticky top-0 z-50 w-full bg-black/10 backdrop-blur-md border-b border-white/5">
        <div class="max-w-7xl mx-auto px-8 py-6 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <a href="index.html" style="font-family: 'Instrument Serif', serif;" class="text-3xl tracking-tight text-foreground">
                    CORNDEVs<sup class="text-xs">®</sup>
                </a>
            </div>
            <div class="flex items-center gap-6">
                <a href="javascript:void(0)" onclick="window.history.back()" class="text-sm font-medium text-muted-foreground hover:text-foreground transition-colors flex items-center gap-1">
                    <span class="material-symbols-outlined !text-sm">arrow_back</span>
                    Quay lại
                </a>
                <span class="text-white/10">|</span>
                <a href="index.html" class="text-sm font-medium text-muted-foreground hover:text-foreground transition-colors">Về Trang chủ</a>
            </div>
        </div>
    </header>

    <div class="flex-grow max-w-4xl mx-auto w-full px-6 py-12 md:py-20">
        <div id="loading" class="flex flex-col items-center justify-center py-20 space-y-4">
            <div class="w-10 h-10 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
            <p class="text-on-surface-variant animate-pulse">Đang tải nội dung bài viết...</p>
        </div>

        <article id="post-container" class="hidden">
            <header class="mb-12" id="post-header">
                <div class="flex items-center gap-4 mb-4">
                    <span class="bg-primary/20 text-primary text-[10px] font-bold px-2 py-1 rounded-sm border border-primary/30 uppercase tracking-widest">Bài viết</span>
                    <span class="text-on-surface-variant text-xs"><span id="read-time">...</span> phút đọc</span>
                </div>
            </header>

            <div id="content" class="md:text-lg"></div>
            
            <footer class="mt-20 pt-10 border-t border-outline-variant flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-surface-bright flex items-center justify-center font-bold text-xl">C</div>
                    <div>
                        <div class="text-base font-bold text-on-surface">Ban quản trị CornDev</div>
                        <div class="text-sm text-on-surface-variant">Kỹ sư Backend & Người viết kỹ thuật</div>
                    </div>
                </div>
            </footer>
        </article>
    </div>

    <script>
        async function loadMarkdown() {
            const urlParams = new URLSearchParams(window.location.search);
            const postPath = urlParams.get('post');
            const loadingEl = document.getElementById('loading');
            const containerEl = document.getElementById('post-container');
            const contentEl = document.getElementById('content');

            if (!postPath) {
                contentEl.innerHTML = '<div class="text-center py-20"><h1 class="text-3xl font-bold mb-4">Chưa chọn bài viết</h1><p class="text-on-surface-variant">Vui lòng quay lại trang chủ và chọn một bài viết để đọc.</p><a href="index.html" class="mt-8 inline-block text-primary hover:underline">Quay về trang chủ</a></div>';
                loadingEl.classList.add('hidden');
                containerEl.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch(postPath + '?t=' + new Date().getTime());
                if (!response.ok) throw new Error('Không thể tải tệp: ' + response.statusText);
                
                const markdown = await response.text();
                
                // Tính toán thời gian đọc
                const words = markdown.trim().split(/\s+/).length;
                const readTime = Math.ceil(words / 200);
                document.getElementById('read-time').innerText = readTime;

                // Cấu hình marked
                marked.setOptions({
                    highlight: function(code, lang) {
                        const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                        return hljs.highlight(code, { language }).value;
                    },
                    langPrefix: 'hljs language-'
                });

                contentEl.innerHTML = marked.parse(markdown);
                
                // Highlight code blocks
                document.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });

                loadingEl.classList.add('hidden');
                containerEl.classList.remove('hidden');
                
                // Cập nhật tiêu đề trang
                const firstH1 = document.querySelector('#content h1');
                if (firstH1) {
                    document.title = firstH1.innerText + ' | CORNDEVs';
                }

            } catch (error) {
                console.error('Error loading post:', error);
                contentEl.innerHTML = `
                    <div class="text-center py-20">
                        <h1 class="text-3xl font-bold mb-4 text-primary">Lỗi tải bài viết</h1>
                        <p class="text-on-surface-variant mb-6">Không thể tải nội dung từ: <code class="bg-surface-container px-2 py-1 rounded">${postPath}</code></p>
                        <p class="text-sm text-outline mb-8">Chi tiết: ${error.message}</p>
                        <a href="index.html" class="bg-primary text-on-primary px-6 py-2 rounded-lg font-bold">Quay lại trang chủ</a>
                    </div>
                `;
                loadingEl.classList.add('hidden');
                containerEl.classList.remove('hidden');
            }
        }

        window.onload = loadMarkdown;
    </script>
</body>
</html>
